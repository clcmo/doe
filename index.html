<!DOCTYPE html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>doe | Camila L. Oliveira</title>
    
    <link rel="shortcut icon" type="image/x-icon" href="./assets/images/logo_clcmo.png">
        
    <!-- Theme Stylesheet -->
    <link rel="stylesheet" href="./assets/css/style.css">

    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    
    <!-- Jquery on header to make sure everything works, the rest  of the scripts in footer for fast loading -->
    <script 
        src="https://code.jquery.com/jquery-3.3.1.min.js"
        integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
        crossorigin="anonymous"></script>
    </head>
    
<body>
    <!-- Canvas -->
    <canvas class="orb-canvas"></canvas>
    <!-- Overlay -->
    <div class="overlay">
        <!-- Overlay inner wrapper -->
        <div class="overlay__inner">
            <!-- Title -->
            <h1 class="overlay__title">
            Oba, você deseja 
            <span class="text-gradient">colaborar</span> para <strong>#camilaloliveira</strong> e <strong>@studiourbanna</strong>?
            </h1>
            <!-- Description -->
            <p class="overlay__description">
                Abrimos a vaquinha digital que será utilizada para os projetos web, mobile e mídias.
                <strong>Você pode doar via cartão ou em Pix (pela Mercado Pago).</strong>
            </p>
            <!-- Buttons -->
            <div class="overlay__btns">
                <button class="overlay__btn overlay__btn--transparent">
                    <a href="https://ko-fi.com/clcmo/?hidefeed=true&widget=true&embed=true&preview=true" target="_blank">
                        Doar via Ko-Fi
                    </a>
                </button>

                <button class="overlay__btn overlay__btn--transparent">
                    <a href="https://mpago.la/1bjNHYM" target="_blank">
                        Doar via Mercado Pago
                    </a>
                </button>

                <button class="overlay__btn overlay__btn--colors">
                    <span>Troca de cor</span>
                    <span class="overlay__btn-emoji">🎨</span>
                  </button>
            </div>
        </div>
    </div>
    <script type="module" src="./assets/js/script.js"></script>
</body>
